<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #1a202c;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats strong {
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f7fafc;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .checkbox:hover {
      border-color: #667eea;
    }

    li.done .checkbox {
      background: #667eea;
      border-color: #667eea;
    }

    .checkbox svg {
      display: none;
    }

    li.done .checkbox svg {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
      cursor: pointer;
      user-select: none;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .empty .icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .clear-btn:hover {
      color: #fc8181;
      border-color: #fc8181;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="item-input" placeholder="아이템 입력..." autocomplete="off">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty">
      <div class="icon">📝</div>
      <div>아직 아이템이 없어요.<br>위에서 추가해 보세요!</div>
    </div>

    <button class="clear-btn" id="clear-btn" onclick="clearDone()" style="display:none">
      완료 항목 모두 삭제
    </button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clear-btn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const done = items.filter(i => i.checked).length;
      stats.innerHTML = `총 <strong>${items.length}</strong>개 · 완료 <strong>${done}</strong>개`;
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('done');

        li.innerHTML = `
          <div class="checkbox" onclick="toggle(${idx})">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="item-text" onclick="toggle(${idx})">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${idx})" title="삭제">✕</button>
        `;

        list.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addItem() {
      const input = document.getElementById('item-input');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
